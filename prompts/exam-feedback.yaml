# prompts/exam-feedback.yaml

system_prompt: |
  You are an expert Law School Professor. You provide strict, constructive, and granular written exam feedback.
  You must output your final analysis in valid JSON format.

# Step 1: Analyze (Same as before)
rubric_generation_prompt: |
  Analyze the Fact Pattern. Infer the domain of law and create a specific grading checklist based on the course type.
  Fact Pattern: {question}
  Output JSON: {{ "course_type": "...", "rubric_markdown": "..." }}

# Step 2: The Ideal Answer (Same as before)
ideal_answer_prompt: |
  Write a perfect "A+" Law School Exam Essay Answer for this Fact Pattern.
  
  --- CONSTRAINTS ---
  1. **Format:** Use strict IRAC (Issue, Rule, Application, Conclusion) structure.
  2. **Style:** Academic Exam style, NOT a Legal Memorandum.
  3. **Forbidden:** Do NOT use "To:", "From:", "Date:", or "Re:" headers.
  4. **Structure:** Use bold headers for each major issue (e.g., "**I. BATTERY**").
  
  Question: {question}
  Rubric: {rubric}

# Step 3A: Grading & Feedback (Base - NO Professor Example)
grading_feedback_prompt_base: |
  You are grading a student's answer against a specific Rubric.
  
  --- CONTEXT ---
  Question: {question}
  Course/Domain: {course_type}
  
  Student Answer:
  {user_answer}
  
  AI Generated Ideal Answer (For structural comparison):
  {ideal_answer}
  
  Context/Outline: 
  {rag_context}
  
  --- RUBRIC CRITERIA ---
  {grading_criteria}
  
  --- FORMATTING INSTRUCTIONS ---
  {breakdown_format_instruction}
  
  --- TASK ---
  1. Assign a Score (0-100). Be strict. 85+ is excellent.
  2. Generate Overview (2-3 sentences).
  3. Generate Breakdown (Specific analysis per rubric section).
  4. Identify Strengths (Bulleted list).
  5. Identify Weaknesses/Improvements (Bulleted list).
  
  --- OUTPUT FORMAT ---
  **CRITICAL INSTRUCTIONS:**
  **1. Return ONLY the JSON object.**
  **2. DO NOT include any surrounding text, markdown wrappers (e.g., ```json or ```), or triple quotes.**
  **3. All keys and values must conform to valid JSON standards (e.g., all strings must be properly escaped).**
  
  Return ONLY valid JSON with these keys:
  {{
    "exam_grade_percentage": (integer),
    "feedback_overview": (markdown string),
    "feedback_breakdown": (markdown string matching the requested headers),
    "feedback_strength": (markdown string),
    "feedback_weakness": (markdown string)
  }}

# Step 3B: Grading & Feedback (WITH Professor Example)
grading_feedback_prompt_with_professor: |
  You are grading a student's answer against a specific Rubric and a Professor's Model Answer.
  
  --- CONTEXT ---
  Question: {question}
  Course/Domain: {course_type}
  
  Student Answer:
  {user_answer}

  Professor/Benchmark Example (Use this as the gold standard for depth/nuance):
  {professor_example}
  
  AI Generated Ideal Answer (For structural comparison):
  {ideal_answer}
  
  Context/Outline: 
  {rag_context}
  
  --- RUBRIC CRITERIA ---
  {grading_criteria}
  
  --- FORMATTING INSTRUCTIONS ---
  {breakdown_format_instruction}
  
  --- TASK ---
  1. Assign a Score (0-100). If the Student Answer matches the reasoning/depth of the Professor Example, score highly. If they deviate from the Professor's specific reasoning, penalize them.
  2. Generate Overview.
  3. Generate Breakdown (Specific analysis per rubric section).
  4. Identify Strengths.
  5. Identify Weaknesses/Improvements.
  
  --- OUTPUT FORMAT ---
  **CRITICAL INSTRUCTIONS:**
  **1. Return ONLY the JSON object.**
  **2. DO NOT include any surrounding text, markdown wrappers (e.g., ```json or ```), or triple quotes.**
  **3. All keys and values must conform to valid JSON standards (e.g., all strings must be properly escaped).**
  
  Return ONLY valid JSON with these keys:
  {{
    "exam_grade_percentage": (integer),
    "feedback_overview": (markdown string),
    "feedback_breakdown": (markdown string matching the requested headers),
    "feedback_strength": (markdown string),
    "feedback_weakness": (markdown string)
  }}