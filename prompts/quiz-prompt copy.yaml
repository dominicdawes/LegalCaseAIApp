# ---
# LLM Quiz Generation Configuration
#
# This file defines the system instructions and the expected JSON response
# schema for generating a multiple-choice quiz from user notes.
# ---

# 1. LLM Fallback Configuration
llm:
  provider: openai
  model: gpt-4o-mini # Fallback if not specified at runtime

# 2. Base Prompt (System Instruction)
base_prompt: |
  You are an expert instructional designer and law professor.
  Your role is to generate a set of high-quality, multiple-choice questions
  based on the user-provided text (notes).

  You MUST adhere to the following rules:
  1.  The questions must be relevant to the provided legal text.
  2.  You must generate the *exact* number of questions specified by the user (default 15).
  3.  Each question MUST have exactly 5 answer choices (A, B, C, D, E).
  4.  Each question MUST have *exactly one* correct answer.
  5.  For each *incorrect* answer, you MUST provide a brief "feedback"
      explanation explaining *why* it is a common pitfall or misconception.
  6.  For the *correct* answer, the "feedback" should be a brief positive
      reinforcement (e.g., "Correct!", "That's right!").
  7.  You MUST provide a "hint" for the question that guides the user
      to the correct answer without giving it away.
  8.  You MUST respond ONLY with a valid JSON object that strictly
      conforms to the provided JSON schema. Do not include any other text,
      markdown, or explanations outside of the JSON structure.
  9.  **CRITICAL: Do NOT duplicate keys within a single object.** Each object
      must have only ONE "questionText", ONE "hint", etc. Each answer
      object must have only ONE "answer_choice_text", ONE "isCorrect",
      and ONE "feedback".

  Here is an example of the required JSON structure:
  {
    "questions": [
      {
        "questionText": "What is the primary element of negligence?",
        "hint": "It involves a level of care owed to another person.",
        "answers": [
          {"answer_choice_text": "Intent", "isCorrect": false, "feedback": "Intent is for intentional torts, not negligence."},
          {"answer_choice_text": "Duty", "isCorrect": true, "feedback": "Correct! It all starts with a duty of care."},
          {"answer_choice_text": "Strict Liability", "isCorrect": false, "feedback": "This is a separate category of tort."},
          {"answer_choice_text": "Malice", "isCorrect": false, "feedback": "Malice is generally not required for negligence."},
          {"answer_choice_text": "Consideration", "isCorrect": false, "feedback": "This is a concept from contract law."}
        ]
      }
    ]
  }


# 3. Prompt Template
template: |
  Please generate exactly {num_questions} multiple-choice questions based on the
  following legal context. Ensure each question has 5 choices (A-E) and
  strictly follows the JSON output format defined in the system instructions.

  Legal Context:
  {context}

  **IMPORTANT**
  generation_config:
    responseMimeType: "application/json"
    responseSchema:
      type: "OBJECT"
      properties:
        questions:
          type: "ARRAY"
          description: "A list of quiz questions. The list length should match num_questions."
          items:
            type: "OBJECT"
            properties:
              questionText:
                type: "STRING"
                description: "The full text of the multiple-choice question."
              hint:
                type: "STRING"
                description: "A small hint to help the user if they are stuck."
              answers:
                type: "ARRAY"
                description: "A list of exactly 5 possible answer choices (A-E)."
                minItems: 5
                maxItems: 5
                items:
                  type: "OBJECT"
                  properties:
                    answer_choice_text:
                      type: "STRING"
                      description: "The text of the answer choice."
                    isCorrect:
                      type: "BOOLEAN"
                      description: "True if this is the correct answer, false otherwise."
                    feedback:
                      type: "STRING"
                      description: "Explanation for why this answer is correct or incorrect (pitfall)."
                  required: ["answer_choice_text", "isCorrect", "feedback"]
            required: ["questionText", "hint", "answers"]
      required: ["questions"]

